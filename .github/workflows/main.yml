name: CI - Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel setuptools
        pip install -r tools/requirements.txt
        pip install -r tests/requirements.txt

    - name: Run Audit Tools
      run: |
        python tools/audit_patterns.py
        python tools/audit_nfr_logic.py
        python tools/audit_asymmetric_conflicts.py

    - name: Run pytest
      run: |
        python -m pytest tests/ -v

    - name: Build distribution artifacts
      run: |
        python -m build

    - name: Smoke test built wheel
      run: |
        python scripts/package_smoke_test.py dist/*.whl tests/fixtures/no-advisory-success.yaml
