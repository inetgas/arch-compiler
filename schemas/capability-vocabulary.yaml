# Capability Vocabulary
#
# PURPOSE: Canonical names for pattern requires/provides capability strings.
#
# This is an ADDITIVE vocabulary — it only registers known synonym pairs and
# environment prerequisites. Unknown capability names are allowed through.
# The vocabulary grows as new synonym pairs are discovered.
#
# STRUCTURE:
#   capabilities:
#     <canonical-name>:
#       category:    "pattern"      — must be provided by a selected pattern
#                    "environment"  — always satisfied by the deployment environment;
#                                     no pattern needs to provide it
#                    "external"     — provided by a cloud/SaaS provider, never by a pattern
#       aliases:     list of known non-canonical strings that should be replaced with
#                    the canonical name (triggers test failure if found in patterns)
#       description: one-line description
#       deprecated:  true if this term is too abstract and should be replaced (optional)
#       replace_with: suggested specific replacements for deprecated terms (optional)
#
# HOW TO ADD AN ENTRY:
#   1. Choose the canonical form (prefer noun over gerund, hyphenated, lowercase)
#   2. List all known aliases (strings currently used in patterns that mean the same thing)
#   3. Set category
#   4. Run tests — patterns using alias strings will now fail test_registry_integrity.py
#   5. Fix the patterns, re-run tests

capabilities:

  # ── Synonym pairs (clear-cut: same concept, different string) ──────────────

  secrets-management:
    category: pattern
    aliases: [secret-management]
    description: Secure storage and injection of credentials and API keys

  timeseries-database:
    category: pattern
    aliases: [time-series-database]
