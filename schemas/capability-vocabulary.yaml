    aliases: [cascading-failure-prevention]
    description: Trips open when a dependency fails repeatedly, preventing cascading failures

  backpressure-handling:
    category: pattern
    aliases: [backpressure-management]
    description: Mechanism for managing load and preventing downstream services from being overwhelmed

  event-driven:
