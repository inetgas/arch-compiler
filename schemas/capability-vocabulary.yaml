    description: Storage layer optimised for JSON documents

  distributed-transaction-coordination:
    category: pattern
    aliases: [distributed-transaction-coordinator]
    description: Coordinates atomic operations across multiple services or data stores

  health-check:
    category: environment
    aliases: [health-checking, health-check-endpoint]
    description: Liveness/readiness endpoint — provided by the deployment platform (k8s probes, load balancer health checks)

