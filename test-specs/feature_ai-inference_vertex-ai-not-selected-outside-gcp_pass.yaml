# Feature - Vertex AI Not Selected Outside GCP
#
# An AWS-hosted Python API with ai_inference: true and no SaaS providers listed.
# This tests that the Vertex AI provider variant does NOT activate outside GCP,
# and that the generic genai-inference pattern remains available as the fallback.
#
# Expected outcome:
#   - compilation SUCCEEDS
#   - generic genai-inference IS selected
#   - genai-inference--vertex-ai is NOT selected (cloud is not gcp)
#   - no SaaS provider-specific inference variants are selected

project:
  name: Cross-Cloud AI Assistant
  domain: ai
functional:
  summary: AI assistant API using a generic managed inference integration
constraints:
  platform: api
  cloud: aws
  language: python
  saas-providers: []
  features:
    ai_inference: true
nfr:
  data:
    pii: false
  availability:
    target: 0.99
  latency:
    p95Milliseconds: 1500
cost:
  ceilings:
    monthly_operational_usd: 2000
