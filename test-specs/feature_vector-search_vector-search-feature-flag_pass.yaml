# Feature - Vector Search Feature Flag
#
# A semantic search API on AWS with Python and vector_search: true feature flag.
# Use case is a document retrieval system requiring embedding storage and
# similarity search. The vector_search feature activates vector database
# patterns (generic and provider-specific variants).
#
# Expected outcome:
#   - compilation SUCCEEDS
#   - vector-search patterns are selected (generic and/or cloud-specific)
#   - embedding storage and similarity search infrastructure is included

project:
  name: Semantic Document Search API
  domain: search
functional:
  summary: Document retrieval API using vector embeddings for semantic search
constraints:
  platform: api
  cloud: aws
  language: python
  features:
    vector_search: true
    ai_inference: true
nfr:
  data:
    pii: false
  availability:
    target: 0.99
  latency:
    p95Milliseconds: 200
cost:
  ceilings:
    monthly_operational_usd: 1000
