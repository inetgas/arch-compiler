# Language - Python + FastAPI Stack
#
# An API spec with Python language and an empty saas-providers list. No cloud
# is specified. This tests that Python-compatible patterns are selected correctly
# and that framework-specific patterns for FastAPI or Python ASGI are available
# in the pattern registry.
#
# Expected outcome:
