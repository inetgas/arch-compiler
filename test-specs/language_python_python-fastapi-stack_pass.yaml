#   - Python-compatible API patterns are selected
#   - no SaaS provider variant patterns are selected (empty saas-providers)

constraints:
  platform: api
  language: python
  saas-providers: []
project:
  name: Python + FastAPI
  domain: test
functional:
  summary: 'Test scenario: Python + FastAPI'
nfr: {}
