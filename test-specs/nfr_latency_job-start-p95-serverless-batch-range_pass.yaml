# NFR Latency - Job Start P95 in Serverless Batch Range (10-300s)
#
# Batch platform with jobStartP95Seconds=60 falls in the serverless batch range
# (10s-300s). data-batch-processing--serverless is selected because serverless
# functions can cold-start within this window; cluster-based approaches with
# longer provisioning times are NOT selected.
#
# Expected outcome:
#   - compilation SUCCEEDS
#   - data-batch-processing--serverless IS selected (jobStartP95 between 10 and 300s)
#   - data-batch-processing--cluster is NOT selected (requires jobStartP95 >= 300s)

project:
  name: Data Export Pipeline
  domain: analytics
functional:
  summary: Nightly data export batch jobs with 60s p95 job start latency target
constraints:
  platform: batch
  cloud: aws
  language: python
  features:
    batch_processing: true
nfr:
  availability:
    target: 0.99
  latency:
    jobStartP95Seconds: 60
    jobStartP99Seconds: 120
  throughput:
    peak_jobs_per_hour: 100
cost:
  ceilings:
    monthly_operational_usd: 500
